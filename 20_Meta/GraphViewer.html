const GROUP_META = {
  2: { label: "Projects (PM)", color: "#58a6ff" },
  3: { label: "PRD", color: "#f78166" },
  4: { label: "Topics / Core", color: "#7ee787" },
  5: { label: "Review Policy (Dev)", color: "#d2a8ff" },
  6: { label: "Meeting Notes", color: "#ffa657" },
  7: { label: "Data Analysis", color: "#ff7b72" }
};

const width = window.innerWidth;
const height = window.innerHeight;

const svg = d3.select("body").append("svg").attr("width", width).attr("height", height);
const g = svg.append("g");
const zoom = d3.zoom().scaleExtent([0.15, 5]).on("zoom", e => g.attr("transform", e.transform));
svg.call(zoom);

const tooltip = d3.select("#tooltip");

const legend = d3.select("#legend");
Object.entries(GROUP_META).forEach(([, m]) => {
  legend.append("div").attr("class","item").html(`<span class="dot" style="background:${m.color}"></span>${m.label}`);
});

const data = GRAPH_DATA;
const linkCount = {};
data.links.forEach(l => { linkCount[l.source] = (linkCount[l.source]||0)+1; linkCount[l.target] = (linkCount[l.target]||0)+1; });

d3.select("#stats").html(`Nodes: ${data.nodes.length} | Links: ${data.links.length}`);

const simulation = d3.forceSimulation(data.nodes)
  .force("link", d3.forceLink(data.links).id(d => d.id).distance(d => 120 / (d.value||1)))
  .force("charge", d3.forceManyBody().strength(-400))
  .force("center", d3.forceCenter(width/2, height/2))
  .force("collision", d3.forceCollide().radius(d => nr(d)+12));

function nr(d){ return Math.max(6, Math.min(20, 4 + (linkCount[d.id]||0)*1.5)); }

const link = g.append("g").selectAll("line").data(data.links).join("line")
  .attr("class","link").attr("stroke","#30363d").attr("stroke-width", d => Math.max(1, d.value));

const node = g.append("g").selectAll("g").data(data.nodes).join("g").attr("class","node")
  .call(d3.drag().on("start",(e,d)=>{if(!e.active)simulation.alphaTarget(0.3).restart();d.fx=d.x;d.fy=d.y;})
  .on("drag",(e,d)=>{d.fx=e.x;d.fy=e.y;}).on("end",(e,d)=>{if(!e.active)simulation.alphaTarget(0);d.fx=null;d.fy=null;}));

node.append("circle").attr("r", d => nr(d)).attr("fill", d => (GROUP_META[d.group]||{}).color||"#8b949e");
node.append("text").attr("dx", d => nr(d)+4).attr("dy","0.35em").text(d => d.id.length>24 ? d.id.slice(0,22)+".." : d.id);

node.on("mouseover",(event,d)=>{
  const conns = data.links.filter(l=>(l.source.id||l.source)===d.id||(l.target.id||l.target)===d.id);
  const names = conns.map(l=>(l.source.id||l.source)===d.id?(l.target.id||l.target):(l.source.id||l.source));
  tooltip.html(`<div class="title">${d.id}</div><div class="path">${d.path}</div>`+(names.length?`<div class="links">Links (${names.length}): ${names.join(", ")}</div>`:""))
    .style("opacity",1).style("left",(event.pageX+14)+"px").style("top",(event.pageY-14)+"px");
  const s = new Set(names); s.add(d.id);
  node.select("circle").attr("opacity",n=>s.has(n.id)?1:0.12);
  node.select("text").attr("opacity",n=>s.has(n.id)?1:0.08);
  link.attr("stroke-opacity",l=>(l.source.id===d.id||l.target.id===d.id)?0.9:0.04)
    .attr("stroke",l=>(l.source.id===d.id||l.target.id===d.id)?"#58a6ff":"#30363d");
}).on("mousemove",e=>{
  tooltip.style("left",(e.pageX+14)+"px").style("top",(e.pageY-14)+"px");
}).on("mouseout",()=>{
  tooltip.style("opacity",0);
  node.select("circle").attr("opacity",1); node.select("text").attr("opacity",1);
  link.attr("stroke-opacity",0.4).attr("stroke","#30363d");
});

d3.select("#search").on("input",function(){
  const q=this.value.toLowerCase();
  if(!q){node.select("circle").attr("opacity",1);node.select("text").attr("opacity",1);link.attr("stroke-opacity",0.4);return;}
  node.select("circle").attr("opacity",d=>d.id.toLowerCase().includes(q)?1:0.08);
  node.select("text").attr("opacity",d=>d.id.toLowerCase().includes(q)?1:0.04);
  link.attr("stroke-opacity",0.04);
});

simulation.on("tick",()=>{
  link.attr("x1",d=>d.source.x).attr("y1",d=>d.source.y).attr("x2",d=>d.target.x).attr("y2",d=>d.target.y);
  node.attr("transform",d=>`translate(${d.x},${d.y})`);
});

setTimeout(()=>{
  const b=g.node().getBBox(), s=0.8/Math.max(b.width/width,b.height/height);
  svg.transition().duration(800).call(zoom.transform,d3.zoomIdentity.translate(width/2-s*(b.x+b.width/2),height/2-s*(b.y+b.height/2)).scale(s));
},2500);
</script>
